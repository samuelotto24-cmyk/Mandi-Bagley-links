<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Mandi Bagley</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --cream:      #FAF7F2;
      --warm-white: #FDF9F5;
      --blush:      #EAD0C8;
      --rose:       #B76E79;
      --rose-pale:  rgba(183,110,121,0.10);
      --espresso:   #2D1810;
      --muted:      #8B7B74;
      --border:     #E8DDD7;
      --card:       #FFFFFF;
      --shadow:     0 1px 3px rgba(45,24,16,0.05), 0 4px 20px rgba(45,24,16,0.04);
      --radius:     14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--espresso);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login ─────────────────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 52px 44px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-ornament {
      display: block;
      width: 36px;
      height: 1px;
      background: var(--rose);
      margin: 0 auto 22px;
    }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 500;
      color: var(--espresso);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .login-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--espresso);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 0.08em;
    }
    .login-input::placeholder { letter-spacing: 0.04em; color: var(--muted); }
    .login-input:focus { border-color: var(--rose); }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--espresso);
      color: #FDF9F5;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.82; }

    .login-error {
      font-size: 12px;
      color: var(--rose);
      margin-top: 12px;
      display: none;
    }

    /* ── Dashboard ─────────────────────────────── */
    #dashboard { display: none; }

    .dash-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 44px 28px 60px;
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .dash-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .dash-brand-sub {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .dash-updated {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    /* Summary cards */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .s-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
    }

    .s-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .s-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 500;
      line-height: 1;
      color: var(--espresso);
    }

    .s-value.s-text {
      font-size: 20px;
      padding-top: 6px;
      line-height: 1.2;
    }

    .s-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Chart cards */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px 28px;
      box-shadow: var(--shadow);
    }

    .chart-card + .chart-card { margin-top: 14px; }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--espresso);
      margin-bottom: 22px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .chart-wrap { position: relative; height: 210px; }

    /* Bar list */
    .bar-list { display: flex; flex-direction: column; gap: 11px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-name {
      font-size: 13px;
      color: var(--espresso);
      width: 140px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--cream);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--rose);
      border-radius: 3px;
      transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .bar-count {
      font-size: 12px;
      color: var(--muted);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 28px 0;
      font-style: italic;
    }

    /* Footer */
    .dash-footer {
      margin-top: 48px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blush);
    }

    /* Responsive */
    @media (max-width: 800px) {
      .summary-row { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .summary-row { grid-template-columns: 1fr; }
      .dash-wrap { padding: 28px 16px 48px; }
      .login-card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-ornament"></span>
    <h1 class="login-title">Mandi Bagley</h1>
    <p class="login-sub">Analytics Dashboard</p>
    <input type="password" id="pwInput" class="login-input" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" onclick="login()">View Analytics</button>
    <p class="login-error" id="loginError">Incorrect password — try again.</p>
  </div>
</div>

<!-- ── Dashboard ──────────────────────────────── -->
<div id="dashboard">
  <div class="dash-wrap">

    <div class="dash-header">
      <div>
        <div class="dash-brand">Mandi Bagley</div>
        <div class="dash-brand-sub">Analytics Dashboard</div>
      </div>
      <div class="dash-updated" id="updatedAt"></div>
    </div>

    <!-- Summary cards -->
    <div class="summary-row">
      <div class="s-card">
        <div class="s-label">Pageviews (30 days)</div>
        <div class="s-value" id="total30">—</div>
        <div class="s-note">total visits</div>
      </div>
      <div class="s-card">
        <div class="s-label">Today</div>
        <div class="s-value" id="today">—</div>
        <div class="s-note">visits today</div>
      </div>
      <div class="s-card">
        <div class="s-label">Top Source</div>
        <div class="s-value s-text" id="topSource">—</div>
        <div class="s-note" id="topSourceNote">—</div>
      </div>
      <div class="s-card">
        <div class="s-label">Top Country</div>
        <div class="s-value s-text" id="topCountry">—</div>
        <div class="s-note" id="topCountryNote">—</div>
      </div>
    </div>

    <!-- Pageviews chart -->
    <div class="chart-card">
      <div class="card-title">Pageviews — Last 30 Days</div>
      <div class="chart-wrap">
        <canvas id="pvChart"></canvas>
      </div>
    </div>

    <!-- Sources + Countries -->
    <div class="two-col">
      <div class="chart-card">
        <div class="card-title">Traffic Sources</div>
        <div id="sourcesList"></div>
      </div>
      <div class="chart-card">
        <div class="card-title">Countries</div>
        <div id="countriesList"></div>
      </div>
    </div>

    <!-- Link clicks -->
    <div class="chart-card" style="margin-top:14px">
      <div class="card-title">Link Clicks</div>
      <div id="clicksList"></div>
    </div>

    <div class="dash-footer">Mandi Bagley &nbsp;·&nbsp; Site Analytics</div>

  </div>
</div>

<script>
  const CLICK_LABELS = {
    tiktok:               'TikTok',
    instagram_main:       'Instagram',
    instagram_munchies:   'Instagram (Munchies)',
    youtube:              'YouTube',
    snapchat:             'Snapchat',
    solin_program:        'Program — Join Now',
    solin:                'Program — Browse',
    gymshark:             'Gymshark',
    ghost_lifestyle:      'Ghost Lifestyle',
    dfyne:                'Dfyne',
    teveo:                'Teveo',
    venmo:                'Venmo',
    paypal:               'PayPal',
    amazon_wishlist:      'Amazon Wishlist',
    email:                'Email',
  };

  const countryNames = new Intl.DisplayNames(['en'], { type: 'region' });

  function getCountryName(code) {
    try { return countryNames.of(code) || code; } catch { return code; }
  }

  function fmt(n) { return Number(n).toLocaleString(); }

  // ── Auth ────────────────────────────────────
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function login() {
    const pw = document.getElementById('pwInput').value.trim();
    if (!pw) return;
    sessionStorage.setItem('mb_pw', pw);
    loadData(pw);
  }

  // Auto-login if stored
  const stored = sessionStorage.getItem('mb_pw');
  if (stored) loadData(stored);

  // ── Data ────────────────────────────────────
  async function loadData(pw) {
    try {
      const res = await fetch(`/api/stats?password=${encodeURIComponent(pw)}`);
      if (res.status === 401) {
        document.getElementById('loginError').style.display = 'block';
        sessionStorage.removeItem('mb_pw');
        return;
      }
      const data = await res.json();
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      render(data);
    } catch {
      document.getElementById('loginError').textContent = 'Could not connect. Please try again.';
      document.getElementById('loginError').style.display = 'block';
    }
  }

  // ── Render ──────────────────────────────────
  function render(data) {
    const todayKey = new Date().toISOString().split('T')[0];

    // Last 30 days
    const days = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push(d.toISOString().split('T')[0]);
    }

    const pv      = data.pageviews  || {};
    const refs    = data.referrers  || {};
    const ctries  = data.countries  || {};
    const clicks  = data.clicks     || {};

    const pvByDay   = days.map(d => pv[d] || 0);
    const total30   = pvByDay.reduce((a, b) => a + b, 0);
    const todayPv   = pv[todayKey] || 0;

    // Summary cards
    document.getElementById('total30').textContent = fmt(total30);
    document.getElementById('today').textContent   = fmt(todayPv);
    document.getElementById('updatedAt').textContent =
      'Last updated ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    const topRef = topEntry(refs);
    document.getElementById('topSource').textContent     = topRef ? topRef[0] : '—';
    document.getElementById('topSourceNote').textContent = topRef ? fmt(topRef[1]) + ' visits' : 'no data yet';

    const topC = topEntry(ctries);
    document.getElementById('topCountry').textContent     = topC ? getCountryName(topC[0]) : '—';
    document.getElementById('topCountryNote').textContent = topC ? fmt(topC[1]) + ' visits' : 'no data yet';

    // Pageviews chart
    const pvCtx = document.getElementById('pvChart').getContext('2d');
    new Chart(pvCtx, {
      type: 'line',
      data: {
        labels: days.map(d => {
          const dt = new Date(d + 'T12:00:00');
          return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }),
        datasets: [{
          data: pvByDay,
          borderColor: '#B76E79',
          backgroundColor: 'rgba(183,110,121,0.07)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: '#B76E79',
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#2D1810',
            titleFont: { family: 'DM Sans', size: 11 },
            bodyFont: { family: 'DM Sans', size: 13 },
            padding: 10,
            callbacks: { label: ctx => `  ${fmt(ctx.parsed.y)} pageviews` },
          },
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: {
              font: { family: 'DM Sans', size: 11 },
              color: '#8B7B74',
              maxTicksLimit: 7,
              maxRotation: 0,
            },
          },
          y: {
            grid: { color: 'rgba(45,24,16,0.04)', drawBorder: false },
            border: { display: false, dash: [4, 4] },
            ticks: {
              font: { family: 'DM Sans', size: 11 },
              color: '#8B7B74',
              maxTicksLimit: 5,
            },
            beginAtZero: true,
          },
        },
      },
    });

    // Sources
    renderBarList('sourcesList', refs, 8);

    // Countries
    const ctryFormatted = {};
    Object.entries(ctries).forEach(([code, n]) => {
      ctryFormatted[getCountryName(code)] = n;
    });
    renderBarList('countriesList', ctryFormatted, 8);

    // Clicks
    const clicksFormatted = {};
    Object.entries(clicks).forEach(([k, v]) => {
      clicksFormatted[CLICK_LABELS[k] || k] = v;
    });
    renderBarList('clicksList', clicksFormatted, 15);
  }

  function topEntry(obj) {
    const entries = Object.entries(obj);
    if (!entries.length) return null;
    return entries.sort((a, b) => b[1] - a[1])[0];
  }

  function renderBarList(id, data, limit) {
    const el = document.getElementById(id);
    const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, limit);
    if (!sorted.length) {
      el.innerHTML = '<div class="empty-state">No data yet — check back soon.</div>';
      return;
    }
    const max = sorted[0][1];
    el.innerHTML = `<div class="bar-list">${sorted.map(([name, count]) => `
      <div class="bar-row">
        <div class="bar-name" title="${name}">${name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.round((count / max) * 100)}%"></div>
        </div>
        <div class="bar-count">${fmt(count)}</div>
      </div>`).join('')}</div>`;
  }
</script>
</body>
</html>
