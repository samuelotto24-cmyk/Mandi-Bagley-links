<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <script>
    // ── Client config ──────────────────────────────────────────────
    // Change these values for each new client deployment.
    const CLIENT = {
      name:   'Mandi Bagley',
      accent: '#B76E79',
      mode:   'light',
      font:   'cormorant',
      url:    'https://mandibagley.com',
    };
    // ──────────────────────────────────────────────────────────────
  </script>

  <script>
    // ── Auto-theme system ──────────────────────────────────────────
    const THEMES = {
      light: {
        bg:'#FAF7F2', bgAlt:'#FDF9F5', surface:'#FFFFFF', text:'#2D1810',
        muted:'#8B7B74', border:'#E8DDD7', headerBg:'#1A0F0B', headerText:'#FAF7F2',
        shadow:'0 1px 3px rgba(45,24,16,0.05),0 4px 20px rgba(45,24,16,0.06)',
        shadowHover:'0 4px 8px rgba(45,24,16,0.08),0 12px 32px rgba(45,24,16,0.10)',
        skeleton:'linear-gradient(90deg,#f0e8e3 25%,#faf7f2 50%,#f0e8e3 75%)',
        loginBg:'radial-gradient(ellipse at 50% 30%,rgba(240,224,216,0.6) 0%,#FAF7F2 70%)',
        tooltipBg:'rgba(26,15,11,0.92)', tooltipBorder:'rgba(0,0,0,0.1)',
        gridLine:'rgba(45,24,16,0.06)', inputBg:'#FAF7F2', inputFocus:'#F5EBE6',
      },
      dark: {
        bg:'#08090D', bgAlt:'#0D1117', surface:'#111827', text:'#EEF2FF',
        muted:'#8FA5C8', border:'#1F2D4A', headerBg:'#060A10', headerText:'#EEF2FF',
        shadow:'0 1px 3px rgba(0,0,0,0.20),0 4px 20px rgba(0,0,0,0.25)',
        shadowHover:'0 4px 8px rgba(0,0,0,0.30),0 12px 32px rgba(0,0,0,0.40)',
        skeleton:'linear-gradient(90deg,#111827 25%,#1F2D4A 50%,#111827 75%)',
        loginBg:'radial-gradient(ellipse at 50% 30%,rgba(13,29,58,0.6) 0%,#08090D 70%)',
        tooltipBg:'rgba(6,10,16,0.95)', tooltipBorder:'rgba(59,130,246,0.25)',
        gridLine:'rgba(31,45,74,0.6)', inputBg:'#0D1117', inputFocus:'#0D1D3A',
      },
    };

    const FONT_MAP = {
      cormorant: { family:"'Cormorant Garamond',serif", url:"Cormorant+Garamond:wght@400;500;600", uppercase:false },
      playfair:  { family:"'Playfair Display',serif",    url:"Playfair+Display:wght@400;500;600", uppercase:false },
      bebas:     { family:"'Bebas Neue',sans-serif",     url:"Bebas+Neue", uppercase:true },
      'dm-serif':{ family:"'DM Serif Display',serif",    url:"DM+Serif+Display:ital@0;1", uppercase:false },
    };

    // Apply theme immediately (before paint)
    (function() {
      const t = THEMES[CLIENT.mode] || THEMES.light;
      const f = FONT_MAP[CLIENT.font] || FONT_MAP.cormorant;
      const r = document.documentElement.style;
      Object.entries({
        '--bg':t.bg, '--bg-alt':t.bgAlt, '--surface':t.surface, '--text':t.text,
        '--muted':t.muted, '--border':t.border, '--header-bg':t.headerBg,
        '--header-text':t.headerText, '--shadow':t.shadow, '--shadow-hover':t.shadowHover,
        '--skeleton':t.skeleton, '--login-bg':t.loginBg, '--tooltip-bg':t.tooltipBg,
        '--tooltip-border':t.tooltipBorder, '--grid-line':t.gridLine,
        '--input-bg':t.inputBg, '--input-focus':t.inputFocus,
        '--accent':CLIENT.accent, '--display-font':f.family,
      }).forEach(function(kv){ r.setProperty(kv[0], kv[1]); });

      // Accent-derived colors
      r.setProperty('--accent-10', CLIENT.accent + '1a');
      r.setProperty('--accent-20', CLIENT.accent + '33');
      r.setProperty('--accent-40', CLIENT.accent + '66');

      // Inject font
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=' + f.url + '&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap';
      document.head.appendChild(link);

      document.title = 'Hub \u2014 ' + CLIENT.name;
    })();
  </script>

  <style>
    :root { --radius: 14px; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login ─────────────────────────────────── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: var(--login-bg);
    }
    @keyframes login-entrance { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 56px 48px;
      width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center;
      animation: login-entrance 0.6s cubic-bezier(0.23,1,0.32,1) forwards;
    }
    .login-ornament {
      display: block; width: 40px; height: 1px;
      background: var(--accent); margin: 0 auto 24px;
    }
    .login-title {
      font-family: var(--display-font); font-size: 38px; font-weight: 400;
      color: var(--text); letter-spacing: 0.02em; margin-bottom: 4px;
    }
    .login-sub {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 36px;
    }
    .login-input {
      width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--input-bg);
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.2s, background 0.2s;
      margin-bottom: 12px; text-align: center; letter-spacing: 0.08em;
    }
    .login-input::placeholder { letter-spacing: 0.04em; color: var(--muted); }
    .login-input:focus { border-color: var(--accent); background: var(--input-focus); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error { font-size: 12px; color: #ef4444; margin-top: 12px; display: none; }

    /* ── Hub ───────────────────────────────────── */
    #hub {
      display: none;
      min-height: 100vh;
      padding: 80px 24px;
      text-align: center;
    }
    .hub-greeting {
      font-family: var(--display-font);
      font-size: 48px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }
    .hub-date {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 40px;
    }
    /* ── Briefing Card ──────────────────────────── */
    .briefing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 560px;
      margin: 0 auto;
      text-align: left;
      overflow: hidden;
    }
    .briefing-header {
      padding: 28px 32px 0;
      font-family: var(--display-font);
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .briefing-body { padding: 24px 32px 28px; }
    .briefing-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .briefing-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 24px;
    }
    .briefing-text:last-of-type { margin-bottom: 0; }
    .briefing-flags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }
    .briefing-flag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 5px 12px;
      border-radius: 100px;
      line-height: 1.3;
    }
    .flag-positive { background: rgba(34,197,94,0.15); color: #16a34a; }
    .flag-warning  { background: rgba(245,158,11,0.15); color: #d97706; }
    .flag-info     { background: var(--accent-10); color: var(--accent); }
    .briefing-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .briefing-error {
      padding: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Skeleton shimmer ────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: var(--skeleton);
      background-size: 800px 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      margin-bottom: 10px;
    }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w90 { width: 90%; }
    .skeleton-line.w40 { width: 40%; }
    .skeleton-label {
      height: 10px;
      width: 100px;
      border-radius: 4px;
      background: var(--skeleton);
      background-size: 800px 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      margin-bottom: 12px;
    }
    .skeleton-pill {
      display: inline-block;
      height: 26px;
      width: 90px;
      border-radius: 100px;
      background: var(--skeleton);
      background-size: 800px 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      margin-right: 8px;
    }

    /* ── Navigation Cards ──────────────────────────── */
    .hub-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 560px;
      margin: 24px auto 0;
    }
    .hub-nav-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hub-nav-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .hub-nav-icon { font-size: 28px; margin-bottom: 12px; }
    .hub-nav-title {
      font-family: var(--display-font);
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .hub-nav-detail {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .hub-nav-status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .hub-nav-btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .hub-nav-btn:hover { opacity: 0.85; }

    /* ── Responsive ─────────────────────────────── */

    /* Tablet / small landscape */
    @media (max-width: 640px) {
      .hub-cards { grid-template-columns: 1fr; }
      .hub-greeting { font-size: 36px; }
      .hub-date { margin-bottom: 28px; }
      .briefing-header { padding: 24px 24px 0; font-size: 21px; }
      .briefing-body { padding: 20px 24px 24px; }
      .briefing-footer { padding: 14px 24px; }
      .briefing-flags { flex-wrap: wrap; }
      #hub { padding: 60px 20px; }
    }

    /* Phone */
    @media (max-width: 480px) {
      .login-card { padding: 40px 24px; }
      .login-title { font-size: 32px; }
      .hub-greeting { font-size: 30px; }
      #hub { padding: 48px 16px; }
      .briefing-card { border-radius: 10px; }
      .briefing-header { padding: 20px 16px 0; font-size: 19px; }
      .briefing-body { padding: 16px 16px 20px; }
      .briefing-footer { padding: 12px 16px; font-size: 10px; }
      .briefing-label { font-size: 9px; }
      .briefing-text { font-size: 13px; }
      .briefing-flag { font-size: 10px; padding: 4px 10px; }
      .hub-nav-card { padding: 24px 16px; }
      .hub-nav-btn {
        display: block;
        width: 100%;
        text-align: center;
        padding: 12px 20px;
        min-height: 44px;
      }
      .login-btn { min-height: 44px; }
      .login-input { min-height: 44px; }
    }

    /* Ensure no horizontal overflow on very small screens */
    @media (max-width: 320px) {
      body { overflow-x: hidden; }
      .login-card { padding: 32px 16px; max-width: 100%; }
      .hub-greeting { font-size: 26px; }
      .briefing-header { font-size: 17px; }
      .hub-nav-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- ── Login ──────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-ornament"></span>
    <h1 class="login-title" id="loginTitle">Client Name</h1>
    <p class="login-sub">Creator Hub</p>
    <input type="password" id="pwInput" class="login-input" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" onclick="login()">Enter Hub</button>
    <p class="login-error" id="loginError">Incorrect password — try again.</p>
  </div>
</div>

<!-- ── Hub ────────────────────────────────────── -->
<div id="hub">
  <h1 class="hub-greeting" id="hubGreeting"></h1>
  <p class="hub-date" id="hubDate"></p>
  <!-- Briefing Card -->
  <div class="briefing-card">
    <!-- Skeleton loading state -->
    <div id="briefingSkeleton">
      <div style="padding:28px 32px 0"><div class="skeleton-line w60"></div></div>
      <div style="padding:24px 32px 28px">
        <div class="skeleton-label"></div>
        <div class="skeleton-line w90"></div>
        <div class="skeleton-line w80"></div>
        <div class="skeleton-line w60" style="margin-bottom:24px"></div>
        <div class="skeleton-label"></div>
        <div class="skeleton-line w80"></div>
        <div class="skeleton-line w60" style="margin-bottom:20px"></div>
        <div style="display:flex;gap:8px">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
        </div>
      </div>
    </div>
    <!-- Real content (hidden until loaded) -->
    <div id="briefingContent" style="display:none">
      <h2 class="briefing-header" id="briefingHeader"></h2>
      <div class="briefing-body">
        <p class="briefing-label">What happened</p>
        <p class="briefing-text" id="briefingSummary"></p>
        <p class="briefing-label">What I'd do</p>
        <p class="briefing-text" id="briefingAdvice"></p>
        <div class="briefing-flags" id="briefingFlags"></div>
      </div>
      <div class="briefing-footer" id="briefingFooter"></div>
    </div>
    <!-- Error state -->
    <div id="briefingError" style="display:none">
      <p class="briefing-error">Unable to load briefing — please refresh or try again later.</p>
    </div>
  </div>

  <!-- Navigation Cards -->
  <div class="hub-cards">
    <!-- Site Card -->
    <div class="hub-nav-card">
      <div class="hub-nav-icon">🌐</div>
      <h3 class="hub-nav-title">My Site</h3>
      <p class="hub-nav-detail" id="siteHostname"></p>
      <p class="hub-nav-status"><span class="status-dot"></span>Live</p>
      <a class="hub-nav-btn" id="siteLink" href="#" target="_blank">View my page →</a>
    </div>
    <!-- Analytics Card -->
    <div class="hub-nav-card">
      <div class="hub-nav-icon">📊</div>
      <h3 class="hub-nav-title">My Analytics</h3>
      <p class="hub-nav-detail" id="analyticsDetail">Loading…</p>
      <p class="hub-nav-status" style="visibility:hidden">·</p>
      <a class="hub-nav-btn" href="/dashboard" target="_blank">Open dashboard →</a>
    </div>
  </div>
</div>

<script>
  // Set login title from config
  document.getElementById('loginTitle').textContent = CLIENT.name;

  // Format current date
  function formatDate() {
    const d = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  // Login
  async function login() {
    const pw = document.getElementById('pwInput').value.trim();
    const err = document.getElementById('loginError');
    err.style.display = 'none';

    if (!pw) { err.textContent = 'Please enter a password.'; err.style.display = 'block'; return; }

    try {
      const res = await fetch('/api/briefing?password=' + encodeURIComponent(pw));
      if (res.ok) {
        sessionStorage.setItem('hub_password', pw);
        document.getElementById('loginScreen').style.display = 'none';
        showHub();
      } else {
        err.textContent = 'Incorrect password — try again.';
        err.style.display = 'block';
      }
    } catch (e) {
      err.textContent = 'Connection error — please retry.';
      err.style.display = 'block';
    }
  }

  // Allow Enter key on password input
  document.getElementById('pwInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  // Show hub
  function showHub() {
    document.getElementById('hubGreeting').textContent = 'Hey, ' + CLIENT.name;
    document.getElementById('hubDate').textContent = formatDate();

    // Populate site card
    try {
      var hostname = new URL(CLIENT.url).hostname;
      document.getElementById('siteHostname').textContent = hostname;
    } catch (e) {
      document.getElementById('siteHostname').textContent = CLIENT.url;
    }
    document.getElementById('siteLink').href = CLIENT.url;

    document.getElementById('hub').style.display = 'block';
    loadBriefing();
  }

  // Load briefing card
  async function loadBriefing() {
    const skeleton = document.getElementById('briefingSkeleton');
    const content = document.getElementById('briefingContent');
    const errorEl = document.getElementById('briefingError');
    skeleton.style.display = 'block';
    content.style.display = 'none';
    errorEl.style.display = 'none';

    try {
      const pw = sessionStorage.getItem('hub_password');
      const res = await fetch('/api/briefing?password=' + encodeURIComponent(pw));
      if (!res.ok) throw new Error('Fetch failed');
      const data = await res.json();

      // Header
      document.getElementById('briefingHeader').textContent =
        'Your Week \u2014 ' + (data.weekRange || '');

      // Summary
      document.getElementById('briefingSummary').textContent =
        data.summary || '';

      // Advice
      document.getElementById('briefingAdvice').textContent =
        data.advice || 'Advisory insights temporarily unavailable';

      // Flags
      const flagsEl = document.getElementById('briefingFlags');
      flagsEl.innerHTML = '';
      if (data.flags && data.flags.length) {
        data.flags.forEach(function(f) {
          var pill = document.createElement('span');
          pill.className = 'briefing-flag flag-' + (f.type || 'info');
          pill.textContent = f.text;
          flagsEl.appendChild(pill);
        });
      }

      // Footer
      var genDate = data.generatedAt ? new Date(data.generatedAt) : null;
      document.getElementById('briefingFooter').textContent = genDate
        ? 'Generated ' + genDate.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + ' at ' + genDate.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })
        : '';

      // Populate analytics card metrics
      if (data.metrics) {
        var views = data.metrics.thisMonthViews;
        var trend = data.metrics.monthOverMonth || '';
        var viewsStr = typeof views === 'number' ? views.toLocaleString() : views;
        var detail = viewsStr + ' views this month';
        if (trend) detail += ' · ' + (trend.charAt(0) === '+' || trend.charAt(0) === '-' ? '' : '↑ ') + trend;
        document.getElementById('analyticsDetail').textContent = detail;
      } else {
        document.getElementById('analyticsDetail').textContent = 'Analytics available in dashboard';
      }

      skeleton.style.display = 'none';
      content.style.display = 'block';
    } catch (e) {
      skeleton.style.display = 'none';
      errorEl.style.display = 'block';
    }
  }

  // Auto-login if session exists
  (async function() {
    const saved = sessionStorage.getItem('hub_password');
    if (saved) {
      try {
        const res = await fetch('/api/briefing?password=' + encodeURIComponent(saved));
        if (res.ok) {
          document.getElementById('loginScreen').style.display = 'none';
          showHub();
        }
      } catch (e) { /* fall through to login screen */ }
    }
  })();
</script>

</body>
</html>
