<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI Usage · Letter Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #FAF8F5;
    --surface:      #FFFFFF;
    --surface-alt:  #F3F0EC;
    --border:       #E5DFD3;
    --border-soft:  #EFE9DC;
    --text:         #000000;
    --text-soft:    #3A3631;
    --muted:        #8A857B;
    --accent:       #DC2626;
    --accent-pale:  rgba(220,38,38,0.10);
    --good:         #2E7D5B;
    --danger:       #C44545;
    --display-font: 'Cormorant Garamond', Georgia, serif;
    --body-font:    'DM Sans', 'Helvetica Neue', Arial, sans-serif;
    --mono-font:    'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--body-font);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; padding-bottom: 80px;
  }

  .topbar {
    position: sticky; top: 0; z-index: 5;
    background: rgba(250,248,245,0.92);
    backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .topbar a.back { color: var(--text-soft); text-decoration: none; font-size: 13px; }
  .topbar a.back:hover { color: var(--accent); }
  .topbar .brand {
    font-family: var(--display-font); font-style: italic;
    font-size: 22px; line-height: 1; flex: 1;
  }

  .container { max-width: 920px; margin: 0 auto; padding: 28px 20px; }
  h1 {
    font-family: var(--display-font); font-weight: 500;
    font-size: 44px; margin: 0 0 6px; letter-spacing: -0.01em;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 22px; }

  .range {
    display: flex; gap: 4px; margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .range button {
    background: none; border: 0;
    padding: 9px 14px; font-size: 13px; font-weight: 500;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px; letter-spacing: 0.02em;
    font-family: inherit;
  }
  .range button.active { color: var(--text); border-bottom-color: var(--accent); }

  .stat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; padding: 14px 16px;
  }
  .stat .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin-bottom: 6px;
  }
  .stat .value {
    font-family: var(--display-font);
    font-size: 30px; font-weight: 500;
    line-height: 1.1;
  }
  .stat .value em { font-style: italic; color: var(--accent); }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .section-h {
    font-family: var(--display-font); font-weight: 500;
    font-size: 22px; margin: 28px 0 10px;
  }

  table {
    width: 100%; border-collapse: collapse;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; overflow: hidden;
    font-size: 13px;
  }
  th, td {
    padding: 10px 14px; text-align: right;
    border-bottom: 1px solid var(--border-soft);
    font-variant-numeric: tabular-nums;
    font-family: var(--mono-font);
  }
  th:first-child, td:first-child { text-align: left; font-family: var(--body-font); }
  th {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted);
    background: var(--surface-alt);
  }
  tr:last-child td { border-bottom: 0; }
  tr.total td {
    font-weight: 700; background: var(--surface-alt);
    border-top: 1px solid var(--border);
  }
  td.cost { color: var(--text); }
  td.cost.zero { color: var(--muted); }
  .op-tag {
    display: inline-block; font-size: 11px;
    padding: 2px 8px; border-radius: 99px;
    background: var(--accent-pale); color: var(--accent);
    font-weight: 600; letter-spacing: 0.02em;
  }

  .day-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
    gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; padding: 14px;
  }
  .day-cell {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 4px;
    border-radius: 2px;
  }
  .day-cell .bar {
    width: 100%; height: 50px;
    background: var(--surface-alt);
    position: relative; border-radius: 2px;
    overflow: hidden;
  }
  .day-cell .bar .fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--accent);
    transition: height .2s;
  }
  .day-cell .label-d {
    font-size: 10px; color: var(--muted);
    font-family: var(--mono-font);
  }
  .day-cell .label-v {
    font-size: 10px; color: var(--text-soft);
    font-family: var(--mono-font);
  }
  .day-cell.today .label-d { color: var(--accent); font-weight: 600; }

  .empty {
    padding: 40px; text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; color: var(--muted); font-size: 14px;
  }
  .empty h2 {
    font-family: var(--display-font); font-style: italic;
    font-size: 26px; color: var(--text-soft); margin: 0 0 8px;
    font-weight: 400;
  }
  .err { color: var(--danger); font-size: 13px; padding: 20px; }

  .gate {
    position: fixed; inset: 0;
    background: var(--bg); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .gate-card {
    background: var(--surface); border: 1px solid var(--border);
    width: 100%; max-width: 360px;
    padding: 30px 28px; border-radius: 4px; text-align: center;
  }
  .gate-card h2 {
    font-family: var(--display-font); font-style: italic;
    font-size: 30px; margin: 0 0 4px; font-weight: 500;
  }
  .gate-card p { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
  .gate-card input {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border);
    border-radius: 2px; font-size: 14px; font-family: var(--body-font); margin-bottom: 12px;
  }
  .gate-card button {
    width: 100%; padding: 11px 14px;
    background: var(--accent); color: #fff;
    border: 0; border-radius: 2px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit;
  }
  .gate-err { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 16px; }

  @media (max-width: 700px) {
    .container { padding: 18px 14px; }
    h1 { font-size: 34px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .stat .value { font-size: 24px; }
    th, td { padding: 8px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="gate" id="gate" style="display:none">
  <div class="gate-card">
    <h2>AI Usage</h2>
    <p>Enter the hub password to continue.</p>
    <input id="gatePw" type="password" autocomplete="current-password" placeholder="Password">
    <button onclick="gateLogin()">Enter</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="topbar">
  <a class="back" href="/hub/studio">← Studio</a>
  <div class="brand">AI Usage</div>
</div>

<div class="container">
  <h1>Token <em>spend</em></h1>
  <div class="subtitle">Per-call AI usage logged from Letter Studio. Updates live.</div>

  <div class="range" id="range">
    <button data-d="7" class="active">Last 7 days</button>
    <button data-d="14">Last 14 days</button>
    <button data-d="30">Last 30 days</button>
  </div>

  <div id="content">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
  let password = sessionStorage.getItem('hubPassword') || '';
  let days = 7;

  function authHeaders() { return { 'Authorization': 'Bearer ' + password, 'Content-Type': 'application/json' }; }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function fmtNum(n) { return Number(n || 0).toLocaleString(); }
  // millicents → dollars string
  function fmtCost(mc) {
    const dollars = Number(mc || 0) / 100000;
    if (dollars === 0) return '$0.00';
    if (dollars < 0.01) return '<$0.01';
    return '$' + dollars.toFixed(dollars < 1 ? 3 : 2);
  }
  function fmtCostShort(mc) {
    const dollars = Number(mc || 0) / 100000;
    if (dollars === 0) return '$0';
    if (dollars < 0.01) return '<1¢';
    if (dollars < 1) return (dollars * 100).toFixed(1) + '¢';
    return '$' + dollars.toFixed(2);
  }

  function showGate() { document.getElementById('gate').style.display = 'flex'; setTimeout(() => document.getElementById('gatePw').focus(), 50); }
  function gateLogin() {
    const pw = document.getElementById('gatePw').value.trim();
    const err = document.getElementById('gateErr'); err.textContent = '';
    if (!pw) return;
    fetch('/api/auth', { headers: { 'Authorization': 'Bearer ' + pw } })
      .then(r => { if (!r.ok) throw new Error('Incorrect password.'); return r.json(); })
      .then(() => { password = pw; sessionStorage.setItem('hubPassword', pw); document.getElementById('gate').style.display = 'none'; load(); })
      .catch(e => { err.textContent = e.message; });
  }
  document.getElementById('gatePw').addEventListener('keydown', e => { if (e.key === 'Enter') gateLogin(); });

  document.querySelectorAll('#range button').forEach(b => {
    b.onclick = () => {
      days = Number(b.dataset.d);
      document.querySelectorAll('#range button').forEach(x => x.classList.toggle('active', x === b));
      load();
    };
  });

  async function load() {
    const target = document.getElementById('content');
    target.innerHTML = '<div class="empty">Loading…</div>';
    try {
      const res = await fetch('/api/studio/usage?days=' + days, { headers: authHeaders() });
      if (res.status === 401) return showGate();
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'failed');
      render(data);
    } catch (e) {
      target.innerHTML = `<div class="err">Couldn't load usage: ${esc(e.message)}</div>`;
    }
  }

  function render(d) {
    const totals = d.totals || {};
    // "Today" = last entry in byDay (sorted oldest → newest)
    const todayBucket = (d.byDay && d.byDay.length) ? d.byDay[d.byDay.length - 1] : { calls: 0, mc: 0 };

    const stats = `
      <div class="stat-grid">
        <div class="stat">
          <div class="label">Today</div>
          <div class="value">${fmtCost(todayBucket.mc)}</div>
          <div class="sub">${fmtNum(todayBucket.calls)} call${todayBucket.calls === 1 ? '' : 's'}</div>
        </div>
        <div class="stat">
          <div class="label">${d.days}-day spend</div>
          <div class="value"><em>${fmtCost(totals.mc)}</em></div>
          <div class="sub">${fmtNum(totals.calls)} call${totals.calls === 1 ? '' : 's'}</div>
        </div>
        <div class="stat">
          <div class="label">Tokens in / out</div>
          <div class="value">${fmtNum(totals.in)}<span style="font-size:14px;color:var(--muted);margin:0 4px">·</span>${fmtNum(totals.out)}</div>
          <div class="sub">cache: ${fmtNum(totals.cr)} read / ${fmtNum(totals.cw)} write</div>
        </div>
        <div class="stat">
          <div class="label">Errors</div>
          <div class="value" style="${totals.errors > 0 ? 'color:var(--danger)' : ''}">${fmtNum(totals.errors)}</div>
          <div class="sub">in last ${d.days} days</div>
        </div>
      </div>
    `;

    // by-op table
    const ops = Object.entries(d.byOp || {}).sort((a, b) => b[1].mc - a[1].mc);
    const opRows = ops.length ? ops.map(([op, b]) => `
      <tr>
        <td><span class="op-tag">${esc(op)}</span></td>
        <td>${fmtNum(b.calls)}</td>
        <td>${fmtNum(b.in)}</td>
        <td>${fmtNum(b.out)}</td>
        <td class="cost ${b.mc === 0 ? 'zero' : ''}">${fmtCost(b.mc)}</td>
      </tr>`).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">No calls yet.</td></tr>`;

    // by-model
    const models = Object.entries(d.byModel || {}).sort((a, b) => b[1].mc - a[1].mc);
    const modelRows = models.length ? models.map(([m, b]) => `
      <tr>
        <td>${esc(m)}</td>
        <td>${fmtNum(b.calls)}</td>
        <td>${fmtNum(b.in)}</td>
        <td>${fmtNum(b.out)}</td>
        <td class="cost ${b.mc === 0 ? 'zero' : ''}">${fmtCost(b.mc)}</td>
      </tr>`).join('') : '';

    // by-day bars
    const maxMc = Math.max(1, ...(d.byDay || []).map(x => x.mc || 0));
    const todayKey = new Date().toISOString().slice(0, 10);
    const dayCells = (d.byDay || []).map(x => {
      const h = Math.round(((x.mc || 0) / maxMc) * 100);
      const isToday = x.day === todayKey;
      const dlabel = x.day.slice(5); // MM-DD
      return `
        <div class="day-cell ${isToday ? 'today' : ''}" title="${esc(x.day)} — ${fmtCost(x.mc)} · ${fmtNum(x.calls)} calls">
          <div class="bar"><div class="fill" style="height:${h}%"></div></div>
          <div class="label-d">${esc(dlabel)}</div>
          <div class="label-v">${fmtCostShort(x.mc)}</div>
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      ${stats}

      <div class="section-h">By day</div>
      <div class="day-strip">${dayCells || '<div class="empty">No usage in this range.</div>'}</div>

      <div class="section-h">By operation</div>
      <table>
        <thead>
          <tr><th>Op</th><th>Calls</th><th>Input tokens</th><th>Output tokens</th><th>Cost</th></tr>
        </thead>
        <tbody>
          ${opRows}
          ${ops.length ? `<tr class="total"><td>Total</td><td>${fmtNum(totals.calls)}</td><td>${fmtNum(totals.in)}</td><td>${fmtNum(totals.out)}</td><td class="cost">${fmtCost(totals.mc)}</td></tr>` : ''}
        </tbody>
      </table>

      ${modelRows ? `
        <div class="section-h">By model</div>
        <table>
          <thead>
            <tr><th>Model</th><th>Calls</th><th>Input tokens</th><th>Output tokens</th><th>Cost</th></tr>
          </thead>
          <tbody>${modelRows}</tbody>
        </table>` : ''}
    `;
  }

  if (!password) showGate(); else load();
</script>
</body>
</html>
